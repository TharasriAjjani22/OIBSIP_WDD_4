<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Login System</title>
    <style>
        
        body {
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(at 0% 0%, #3a1c71 0px, transparent 50%),
                        radial-gradient(at 50% 0%, #d76d77 0px, transparent 50%),
                        radial-gradient(at 100% 0%, #ffaf7b 0px, transparent 50%);
            background-color: #1a1a1a;
            overflow: hidden;
        }

        
        .auth-card {
            background: rgba(30, 31, 34, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            padding: 40px 32px;
            border-radius: 16px;
            width: 90%;
            max-width: 440px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
        }

        h2 { font-size: 28px; margin-bottom: 12px; font-weight: 700; color: #fff; }
        .subtitle { color: #b2b2b2; margin-bottom: 32px; font-size: 15px; line-height: 1.4; }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .social-btn {
            width: 100%;
            height: 48px;
            border: 1px solid #3d3e40;
            border-radius: 8px;
            background: transparent;
            color: white;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .social-btn:hover {
            background: rgba(255,255,255,0.05);
            border-color: #5e6063;
        }

        
        .social-btn svg {
            margin-right: 12px;
            width: 20px;
            height: 20px;
        }

        .divider {
            margin: 24px 0;
            color: #5e6063;
            font-size: 14px;
        }

        .footer-links {
            margin-top: 32px;
            font-size: 12px;
            color: #b2b2b2;
        }

        .footer-links a { color: #8b3dff; text-decoration: none; font-weight: 600; }

        
        @media (max-width: 480px) {
            .auth-card { padding: 30px 20px; }
            h2 { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2>Log in or sign up in seconds</h2>
        <p class="subtitle">Use your email or another service to continue with Canva (it's free!)</p>

        <div class="btn-group">
            <button class="social-btn" onclick="alert('Phone login triggered')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
                Continue with phone number
            </button>

            <button class="social-btn" onclick="alert('Google Auth triggered')">
                <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Continue with Google
            </button>

            <button class="social-btn" onclick="alert('Email login triggered')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                Continue with email
            </button>
        </div>

        <div class="divider">Continue another way</div>

        <div class="footer-links">
            By continuing, you agree to Insta's <a href="#">Terms of Use</a>. <br>
            Read our <a href="#">Privacy Policy</a>.
        </div>
    </div>

</body>
</html>
