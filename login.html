<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Responsive Instagram Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    font-family: 'Roboto', sans-serif;
}


.collage-bg {
    background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url('https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7');
    background-size: cover;
    background-position: center;
}

.glass-card {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
}

</style>
</head>

<body class="collage-bg flex items-center justify-center min-h-screen">


<div id="auth-container" class="w-full max-w-[380px] p-4">

    <div class="glass-card border p-8 rounded-xl shadow-2xl text-center">

        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png" class="mt-4 mb-8 w-46" alt="Instagram">
            

        <input id="username" placeholder="Phone number, username, or email"
        class="w-full border p-2 mb-2 text-sm rounded">

        <input id="password" type="password" placeholder="Password"
        class="w-full border p-2 mb-3 text-sm rounded">

        <button onclick="handleAuth()"
        class="w-full bg-[#0095f6] text-white py-2 rounded font-semibold">
        Log In
        </button>

        <div class="flex items-center my-4">
            <div class="flex-1 h-px bg-gray-300"></div>
            <span class="px-2 text-xs text-gray-400">OR</span>
            <div class="flex-1 h-px bg-gray-300"></div>
        </div>

        <p class="text-blue-900 text-sm font-semibold">Log in with Facebook</p>
        <p class="text-xs text-blue-800 mt-3">Forgot password?</p>
    </div>

    <div class="glass-card mt-3 p-4 text-center rounded-xl">
        <p class="text-sm">
            Don't have an account?
            <span onclick="toggleMode()" class="text-blue-500 cursor-pointer font-semibold">
                Sign up
            </span>
        </p>
    </div>
</div>


<div id="feed-page" class="hidden w-full min-h-screen bg-gray-50">

<nav class="fixed top-0 left-0 right-0 bg-white border-b border-gray-300 h-14 flex items-center justify-between px-6 z-50">

    
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png"
    class="w-28">

    
    <input type="text" placeholder="Search"
    class="hidden md:block bg-gray-100 px-3 py-1 rounded text-sm">

    <button onclick="logout()" class="text-red-500 text-sm font-semibold">
        Logout
    </button>
</nav>


<div class="pt-20 flex justify-center">
<div class="w-full max-w-[470px]">


<div class="flex space-x-4 overflow-x-auto bg-white border p-3 rounded-lg mb-4">

    <div class="text-center">
        <div class="w-16 h-16 rounded-full p-[2px] bg-gradient-to-tr from-yellow-400 to-pink-600">
            <img src="https://i.pravatar.cc/100?u=1" class="rounded-full border-2 border-white">
        </div>
        <p class="text-xs mt-1">user1</p>
    </div>

    <div class="text-center">
        <div class="w-16 h-16 rounded-full p-[2px] bg-gradient-to-tr from-yellow-400 to-pink-600">
            <img src="https://i.pravatar.cc/100?u=2" class="rounded-full border-2 border-white">
        </div>
        <p class="text-xs mt-1">user2</p>
    </div>

</div>

<div id="posts" class="space-y-6"></div>

</div>
</div>
</div>

<script>
let isLogin = true;

function toggleMode() {
    isLogin = !isLogin;
    alert(isLogin ? "Login Mode" : "Signup Mode");
}

function handleAuth() {
    const user = username.value;
    const pass = password.value;

    if (user.length < 3 || pass.length < 6) {
        alert("Enter valid credentials");
        return;
    }

    if (isLogin) {
        const stored = localStorage.getItem(user);

        if (stored === pass || (user==="admin" && pass==="123456")) {
            enterFeed();
        } else {
            alert("Invalid login");
        }
    } else {
        localStorage.setItem(user, pass);
        alert("Registered! Now login");
        isLogin = true;
    }
}

function enterFeed() {
    document.getElementById("auth-container").style.display="none";
    document.getElementById("feed-page").style.display="block";
    document.body.classList.remove("collage-bg");

    loadPosts();
}

function logout() {
    location.reload();
}


const postsData = [
{
    user:"nature",
    profile:"https://i.pravatar.cc/150?u=1",
    img:"https://images.unsplash.com/photo-1501785888041-af3ef285b470",
    caption:"Beautiful nature 🌿",
    likes:"2,345"
},
{
    user:"foodie",
    profile:"https://i.pravatar.cc/150?u=2",
    img:"https://images.unsplash.com/photo-1490645935967-10de6ba17061",
    caption:"Yummy 😍",
    likes:"1,200"
}
];

function loadPosts() {
    const container = document.getElementById("posts");
    container.innerHTML = "";

    postsData.forEach(post => {
        container.innerHTML += `
        <div class="bg-white border border-gray-300">

            <div class="flex items-center justify-between p-3">
                <div class="flex items-center">
                    <img src="${post.profile}" class="w-8 h-8 rounded-full">
                    <span class="ml-2 text-sm font-semibold">${post.user}</span>
                </div>
                <span>⋯</span>
            </div>

            <img src="${post.img}" class="w-full object-cover max-h-[500px]">

            <div class="px-3 pt-2">
                <div class="flex space-x-4 text-2xl">
                    ❤️ 💬 ✈️
                </div>
            </div>

            <div class="px-3 pt-1">
                <p class="text-sm font-semibold">${post.likes} likes</p>
            </div>

            <div class="px-3 pt-1 pb-2">
                <p class="text-sm">
                    <span class="font-semibold">${post.user}</span> ${post.caption}
                </p>
            </div>

            <div class="px-3 pb-3">
                <p class="text-xs text-gray-400 uppercase">2 minutes ago</p>
            </div>

        </div>
        `;
    });
}
</script>

</body>
</html>
