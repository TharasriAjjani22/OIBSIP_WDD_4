<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
        body { font-family: 'Roboto', sans-serif; transition: background-color 0.3s ease; }
        
        
        .collage-bg {
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?q=80&w=1974&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        .insta-gradient {
            background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="collage-bg flex items-center justify-center min-h-screen">

    <div id="auth-container" class="w-full max-w-[350px] p-4">
        <div class="glass-card border border-gray-300 p-8 flex flex-col items-center mb-4 rounded-md shadow-2xl">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png" class="mt-4 mb-8 w-44" alt="Instagram">
            
            <div id="form-fields" class="w-full space-y-2">
                <input type="text" id="username" placeholder="Phone number, username, or email" class="w-full px-2 py-2 text-xs bg-gray-50 border border-gray-300 rounded-sm focus:outline-none focus:border-gray-400">
                <input type="password" id="password" placeholder="Password" class="w-full px-2 py-2 text-xs bg-gray-50 border border-gray-300 rounded-sm focus:outline-none focus:border-gray-400">
                
                <button onclick="handleAuth()" id="main-btn" class="w-full bg-[#0095f6] text-white py-1.5 rounded font-semibold text-sm mt-4 hover:bg-blue-600 transition">Log In</button>
            </div>

            <div class="flex items-center my-4 w-full">
                <div class="flex-1 h-px bg-gray-300"></div>
                <div class="px-4 text-xs text-gray-400 font-semibold">OR</div>
                <div class="flex-1 h-px bg-gray-300"></div>
            </div>

            <button class="flex items-center text-[#385185] font-semibold text-sm">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_(2019).png" class="w-5 h-5 mr-2" alt="FB">
                Log in with Facebook
            </button>
            <p class="text-xs text-[#00376b] mt-4 cursor-pointer">Forgot password?</p>
        </div>

        <div class="glass-card border border-gray-300 p-6 text-center text-sm rounded-md shadow-xl">
            <p id="switch-text">Don't have an account? <span onclick="toggleMode()" class="text-[#0095f6] font-semibold cursor-pointer">Sign up</span></p>
        </div>
    </div>

    <div id="feed-page" class="hidden w-full min-h-screen bg-white">
        <nav class="fixed top-0 left-0 right-0 bg-white border-b border-gray-300 h-16 flex items-center justify-between px-4 md:px-20 z-50">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png" class="w-28" alt="Instagram">
            <div class="flex items-center space-x-4">
                <button onclick="logout()" class="text-sm font-semibold text-red-500 border border-red-500 px-3 py-1 rounded-md hover:bg-red-50 transition">Logout</button>
            </div>
        </nav>

        <div class="pt-24 pb-10 flex flex-col items-center">
            <div class="w-full max-w-[470px] bg-white border border-gray-300 rounded-lg">
                <div class="p-4 flex items-center justify-between">
                    <div class="flex items-center">
                        <div class="w-10 h-10 rounded-full insta-gradient p-[2px]">
                            <div class="w-full h-full rounded-full bg-white p-[2px]">
                                <img src="https://i.pravatar.cc/150?u=gemini" class="rounded-full w-full h-full object-cover">
                            </div>
                        </div>
                        <span class="ml-3 font-semibold text-sm">gemini_ai_official</span>
                    </div>
                    <span class="font-bold text-lg cursor-pointer">...</span>
                </div>

                <div class="relative">
                    <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?q=80&w=2070&auto=format&fit=crop" class="w-full object-cover max-h-[500px]" alt="Post">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" class="absolute top-4 right-4 w-8 bg-white/80 p-1 rounded-full shadow-lg">
                </div>

                <div class="p-4">
                    <div class="flex space-x-4 mb-2">
                        <span class="text-2xl cursor-pointer">❤️</span>
                        <span class="text-2xl cursor-pointer">💬</span>
                        <span class="text-2xl cursor-pointer">✈️</span>
                    </div>
                    <p class="text-sm font-bold mb-1">1,248 likes</p>
                    <p class="text-sm"><span class="font-bold">gemini_ai</span> Hey Welcome...!!! Your Instagram authentication is now live! 🚀 Access granted to the secured page content. ✨</p>
                    <p class="text-xs text-gray-400 mt-2 uppercase tracking-tighter">2 minutes ago</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isLoginMode = true;

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('main-btn').innerText = isLoginMode ? 'Log In' : 'Sign Up';
            document.getElementById('switch-text').innerHTML = isLoginMode 
                ? "Don't have an account? <span onclick='toggleMode()' class='text-[#0095f6] font-semibold cursor-pointer'>Sign up</span>"
                : "Have an account? <span onclick='toggleMode()' class='text-[#0095f6] font-semibold cursor-pointer'>Log in</span>";
        }

        function handleAuth() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user.length < 3 || pass.length < 6) {
                alert("Please enter valid credentials (Min: 6 chars for password)");
                return;
            }

            if (isLoginMode) {
                const storedPass = localStorage.getItem(user);
                if (storedPass === pass || (user === "admin" && pass === "123456")) {
                    enterFeed();
                } else {
                    alert("Invalid username or password. (Hint: Register first or use admin/123456)");
                }
            } else {
                localStorage.setItem(user, pass);
                alert("Registration Successful! Please login.");
                toggleMode();
            }
        }

        function enterFeed() {
            document.getElementById('auth-container').classList.add('hidden');
            document.body.classList.remove('collage-bg');
            document.body.classList.add('bg-gray-50');
            document.getElementById('feed-page').classList.remove('hidden');
        }

        function logout() {
            location.reload();
        }
    </script>
</body>
</html>
